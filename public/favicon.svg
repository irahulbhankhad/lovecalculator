<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d7b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e040fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="innerGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Main Heart -->
  <path d="M32 56 C32 56, 8 40, 8 22 C8 14, 14 8, 22 8 C26.5 8, 30 10.5, 32 14 C34 10.5, 37.5 8, 42 8 C50 8, 56 14, 56 22 C56 40, 32 56, 32 56Z" 
        fill="url(#heartGrad)" filter="url(#glow)" />
  <!-- Shine overlay -->
  <path d="M32 56 C32 56, 8 40, 8 22 C8 14, 14 8, 22 8 C26.5 8, 30 10.5, 32 14 C34 10.5, 37.5 8, 42 8 C50 8, 56 14, 56 22 C56 40, 32 56, 32 56Z" 
        fill="url(#innerGrad)" />
  <!-- AI circuit dots -->
  <circle cx="24" cy="22" r="2" fill="rgba(255,255,255,0.7)" />
  <circle cx="40" cy="22" r="2" fill="rgba(255,255,255,0.7)" />
  <circle cx="32" cy="30" r="2.5" fill="rgba(255,255,255,0.8)" />
  <!-- Connection lines -->
  <line x1="24" y1="22" x2="32" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1" />
  <line x1="40" y1="22" x2="32" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1" />
  <line x1="24" y1="22" x2="40" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="0.8" />
</svg>
